name: Bug report
description: Report a reproducible problem in Video For Lazies.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not attach private videos or files that contain sensitive information.
  - type: input
    id: version
    attributes:
      label: App version
      description: Use the release version, commit, or branch name.
      placeholder: "1.0.0"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows x64 portable zip
        - Linux x64 portable zip
        - Windows development build
        - Linux development build
        - Other
    validations:
      required: true
  - type: input
    id: release_asset
    attributes:
      label: Release asset or build source
      description: Name the zip, workflow artifact, local build command, or commit used.
      placeholder: "Video_For_Lazies-v1.0.0-win-x64.zip"
    validations:
      required: true
  - type: dropdown
    id: ffmpeg_source
    attributes:
      label: FFmpeg source
      description: Tell us whether the bundled sidecar or an override/PATH FFmpeg was active.
      options:
        - Bundled sidecar
        - VFL_FFMPEG_PATH / VFL_FFPROBE_PATH override
        - ffmpeg / ffprobe from PATH
        - Not sure
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include input format, selected settings, and what command or button you used.
      placeholder: |
        1. Open ...
        2. Select ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: Include visible errors. Redact paths, usernames, and filenames if needed.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Optional. Redact private paths and filenames.
      render: shell
