name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  workflow-lint:
    name: Lint workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download actionlint
        id: actionlint
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/actionlint"
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12 "$RUNNER_TEMP/actionlint"

      - name: Check workflow files
        shell: bash
        run: ${{ steps.actionlint.outputs.executable }} -color

  test:
    name: Test and audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci
        working-directory: app

      - name: Check synchronized app version
        run: npm run version:check
        working-directory: app

      - name: Audit npm dependencies
        run: npm audit --audit-level=moderate
        working-directory: app

      - name: Test frontend utilities
        run: npm test
        working-directory: app

      - name: Typecheck and build frontend
        run: npm run build
        working-directory: app

      - name: Test Rust backend
        run: cargo test --manifest-path app/src-tauri/Cargo.toml
