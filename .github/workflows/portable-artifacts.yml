name: Portable Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build. Must match app metadata, for example 0.1.0."
        required: true
        type: string
      release_notes:
        description: "Curated release summary or changelog. Leave blank to generate from commits."
        required: false
        type: string
      previous_tag:
        description: "Optional previous release tag for changelog range, for example v0.1.0 or none."
        required: false
        type: string
      draft:
        description: "Create a draft release for review."
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as a prerelease."
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  portable:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
          - os: windows-2022
            target: win-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            unzip \
            wget \
            zip

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci
        working-directory: app

      - name: Resolve version
        id: version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="$(node scripts/check-version.mjs --value "$REQUESTED_VERSION")"
          {
            echo "version=$VERSION"
            echo "short_sha=${GITHUB_SHA::7}"
          } >> "$GITHUB_OUTPUT"
        working-directory: app

      - name: Audit npm dependencies
        run: npm audit --audit-level=moderate
        working-directory: app

      - name: Test frontend utilities
        run: npm test
        working-directory: app

      - name: Test Rust backend
        run: cargo test --manifest-path app/src-tauri/Cargo.toml

      - name: Build portable zip
        run: npm run release:portable
        working-directory: app

      - name: Upload private portable artifact
        uses: actions/upload-artifact@v7
        with:
          name: Video_For_Lazies-v${{ steps.version.outputs.version }}-${{ matrix.target }}-${{ steps.version.outputs.short_sha }}
          path: |
            release/Video_For_Lazies-v${{ steps.version.outputs.version }}-${{ matrix.target }}.zip
            release/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: portable
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: app

      - name: Resolve release version
        id: version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="$(node scripts/check-version.mjs --value "$REQUESTED_VERSION")"
          {
            echo "version=$VERSION"
            echo "tag=v$VERSION"
            echo "target_sha=$(git rev-parse HEAD)"
          } >> "$GITHUB_OUTPUT"
        working-directory: app

      - name: Download portable artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: Video_For_Lazies-v${{ steps.version.outputs.version }}-*
          path: release/downloaded-artifacts

      - name: Stage release assets
        run: node scripts/prepare-release-assets.mjs --input release/downloaded-artifacts --output release/release-assets
        working-directory: app

      - name: Generate release notes
        env:
          VFL_RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
          VFL_PREVIOUS_TAG: ${{ github.event.inputs.previous_tag }}
        run: node scripts/generate-release-notes.mjs --version "${{ steps.version.outputs.version }}" --output release/RELEASE_NOTES.md
        working-directory: app

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          DRAFT_RELEASE: ${{ github.event.inputs.draft }}
          PRERELEASE: ${{ github.event.inputs.prerelease }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          TARGET_SHA: ${{ steps.version.outputs.target_sha }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
            exit 1
          fi

          if git rev-parse "$RELEASE_TAG^{commit}" >/dev/null 2>&1; then
            TAG_SHA="$(git rev-parse "$RELEASE_TAG^{commit}")"
            if [[ "$TAG_SHA" != "$TARGET_SHA" ]]; then
              echo "Tag $RELEASE_TAG points at $TAG_SHA, expected $TARGET_SHA."
              exit 1
            fi
          fi

          args=(
            "$RELEASE_TAG"
            release/release-assets/*
            --target "$TARGET_SHA"
            --title "Video For Lazies $RELEASE_TAG"
            --notes-file release/RELEASE_NOTES.md
            --fail-on-no-commits
          )

          if [[ "${DRAFT_RELEASE:-true}" == "true" ]]; then
            args+=(--draft)
          fi
          if [[ "${PRERELEASE:-true}" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
